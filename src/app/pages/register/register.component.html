<ng-particles
  [id]="'tsparticles'"
  [options]="particlesOptions">
</ng-particles>

<mat-card class="card">
  <div class="logo-section">
    <img src="assets\aynoraaa.jpeg" alt="Company Logo" class="logo" />
  </div>

  <mat-card-title>Registration</mat-card-title>

  <mat-card-content>
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

      <!-- Username -->
      <mat-form-field appearance="outline" class="full-width" floatLabel="always">
        <mat-label>Username</mat-label>
        <input matInput formControlName="username" placeholder="Enter your username" />
        <mat-error *ngIf="registerForm.get('username')?.touched && registerForm.get('username')?.invalid">
          Username is required
        </mat-error>
      </mat-form-field>

      <!-- Email -->
      <mat-form-field appearance="outline" class="full-width" floatLabel="always">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" type="email" placeholder="Enter your email" />
        <mat-error *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid">
          Valid email is required
        </mat-error>
      </mat-form-field>

      <!-- Password -->
      <mat-form-field appearance="outline" class="full-width" floatLabel="always">
        <mat-label>Password</mat-label>
        <input matInput formControlName="password" type="password" placeholder="Enter your password" />
        <mat-error *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.invalid">
          Minimum 6 characters required
        </mat-error>
      </mat-form-field>

      <!-- Confirm Password -->
      <mat-form-field appearance="outline" class="full-width" floatLabel="always">
        <mat-label>Confirm Password</mat-label>
        <input matInput formControlName="confirmPassword" type="password" placeholder="Confirm your password" />
        <mat-error *ngIf="passwordMismatch">
          Passwords do not match
        </mat-error>
      </mat-form-field>

      <!-- Role -->
      <mat-form-field appearance="outline" class="full-width" floatLabel="always">
        <mat-label>Role (optional)</mat-label>
        <mat-select formControlName="role" >
          <mat-option [value]="'User'">User</mat-option>
          <mat-option [value]="'Guest'">Guest</mat-option>
       <!-- <mat-option [value]="'Admin'">Admin</mat-option> -->
        </mat-select>
      </mat-form-field>

      <!-- Submit Button -->
      <button mat-raised-button class="full-width" type="submit" [disabled]="registerForm.invalid || loading">
        <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
        <span *ngIf="!loading">Register</span>
      </button>
    </form>

    <p>Already have an account? <a routerLink="/login">Login</a></p>
  </mat-card-content>
</mat-card>
