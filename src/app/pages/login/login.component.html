<ng-particles
  [id]="'tsparticles'"
  [options]="particlesOptions">
</ng-particles>

<mat-card class="card">
  <div class="logo-section">
    <img src="assets\aynoraaa.jpeg" alt="Company Logo" class="logo" />
    <div class="tagline">Shop Smart, Live Better</div>
  </div>

  <mat-card-content>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="tagline"><small>Enter your credentials to start shopping</small></div>

     <mat-form-field appearance="outline" class="full-width custom-field" floatLabel="always">
  <mat-label>Email</mat-label>
  <input matInput formControlName="email" type="email" placeholder="Enter your email"/>
  <mat-error *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
    Valid email required
  </mat-error>
</mat-form-field>

<mat-form-field appearance="outline" class="full-width custom-field" floatLabel="always">
  <mat-label>Password</mat-label>
  <input matInput formControlName="password" type="password" placeholder="Enter your password"/>
  <mat-error *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
    Password required
  </mat-error>
</mat-form-field>


      <!-- Button -->
      <button mat-raised-button class="full-width" type="submit" [disabled]="loginForm.invalid || loading">
        <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
        <span *ngIf="!loading">Login</span>
      </button>
    </form>

    <br />
    <p>Don't have an account? <a routerLink="/register">Register</a></p>
    <div class="forgot-password">
      <a routerLink="/forgot-password">Forgot Password?</a>
    </div>
  </mat-card-content>
</mat-card>
