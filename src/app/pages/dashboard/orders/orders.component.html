<div class="container mt-4">
  <h2>All Orders</h2>

  <table class="table table-bordered">
    <thead>
      <tr>
        <th>ID</th>
        <th>Customer</th>
        <th>Total</th>
        <th>Status</th>
        <th>Items</th>
        <th>Update</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let o of orders">
        <td>{{ o.id }}</td>
        <td>{{ o.customerName }}<br/>{{ o.customerEmail }}</td>
        <td>${{ o.total }}</td>
        <td>{{ o.status }}</td>
        <td>
          <ul>
            <li *ngFor="let it of o.items">
              {{ it.productName }} (x{{ it.quantity }})
            </li>
          </ul>
        </td>
        <td>
          <select [value]="o.status" (change)="onStatusChange(o, $event)" class="form-select">

            <option *ngFor="let s of statuses" [value]="s">{{ s }}</option>
          </select>
        </td>
      </tr>
    </tbody>
  </table>
</div>
