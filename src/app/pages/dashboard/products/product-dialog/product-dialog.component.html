<h2 mat-dialog-title>{{ data ? 'Edit Product' : 'Add Product' }}</h2>
<mat-dialog-content [formGroup]="form" class="dialog-body">
  <mat-form-field appearance="outline" class="full"><mat-label>Name</mat-label>
    <input matInput formControlName="name"></mat-form-field>

  <mat-form-field appearance="outline" class="half"><mat-label>Brand</mat-label>
    <input matInput formControlName="brand"></mat-form-field>

  <mat-form-field appearance="outline" class="half"><mat-label>Price</mat-label>
    <input matInput type="number" formControlName="price"></mat-form-field>

  <mat-form-field appearance="outline" class="half"><mat-label>Stock</mat-label>
    <input matInput type="number" formControlName="stock"></mat-form-field>

  <mat-form-field appearance="outline" class="full"><mat-label>Image URL</mat-label>
    <input matInput formControlName="imageUrl" placeholder="https://..."></mat-form-field>

  <mat-form-field appearance="outline" class="full"><mat-label>Description</mat-label>
    <textarea matInput formControlName="description" rows="3"></textarea></mat-form-field>

  <mat-form-field appearance="outline" class="half"><mat-label>Status</mat-label>
    <mat-select formControlName="isActive">
      <mat-option [value]="true">Active</mat-option>
      <mat-option [value]="false">Inactive</mat-option>
    </mat-select>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-flat-button color="primary" (click)="save()">Save</button>
</mat-dialog-actions>
