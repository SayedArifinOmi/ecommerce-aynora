<mat-card>
  <div class="header">
    <h2>Products</h2>
    <button mat-raised-button color="primary" (click)="openDialog()">Add Product</button>
  </div>

  <table mat-table [dataSource]="data" matSort>

    <ng-container matColumnDef="image">
      <th mat-header-cell *matHeaderCellDef>Image</th>
      <td mat-cell *matCellDef="let p">
        <img [src]="p.imageUrl || 'assets/placeholder-watch.jpg'" class="thumb" />
      </td>
    </ng-container>

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
      <td mat-cell *matCellDef="let p">{{ p.name }}</td>
    </ng-container>

    <ng-container matColumnDef="brand">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Brand</th>
      <td mat-cell *matCellDef="let p">{{ p.brand }}</td>
    </ng-container>

    <ng-container matColumnDef="price">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Price</th>
      <td mat-cell *matCellDef="let p">{{ p.price | currency }}</td>
    </ng-container>

    <ng-container matColumnDef="stock">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Stock</th>
      <td mat-cell *matCellDef="let p">{{ p.stock }}</td>
    </ng-container>

    <ng-container matColumnDef="isActive">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let p">
        <mat-chip [color]="p.isActive ? 'primary' : undefined" [selected]="p.isActive">
          {{ p.isActive ? 'Active' : 'Inactive' }}
        </mat-chip>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let p">
        <button mat-icon-button matTooltip="Edit" (click)="openDialog(p)"><mat-icon>edit</mat-icon></button>
        <button mat-icon-button color="warn" matTooltip="Delete" (click)="remove(p)"><mat-icon>delete</mat-icon></button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="cols"></tr>
    <tr mat-row *matRowDef="let row; columns: cols;"></tr>
  </table>

  <mat-paginator [length]="total" [pageSize]="pageSize" [pageSizeOptions]="[5,10,20]" (page)="onPage($event)">
  </mat-paginator>
</mat-card>
