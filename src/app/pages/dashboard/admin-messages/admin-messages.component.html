<div *ngIf="loading">Loading messages...</div>
<div *ngIf="!loading && messages.length === 0">No messages found.</div>

<mat-card *ngFor="let msg of messages" class="message-card">
  <mat-card-title>
    {{ msg.subject || 'No Subject' }} 
    <span *ngIf="!msg.isRead" class="unread">●</span>
  </mat-card-title>
  <mat-card-subtitle>
    From: {{ msg.name }} ({{ msg.email }}) — {{ msg.createdAt | date:'short' }}
  </mat-card-subtitle>
  <mat-card-content>
    <p>{{ msg.message }}</p>
  </mat-card-content>
  <mat-card-actions>
    <button mat-button color="primary" (click)="markRead(msg)">Mark as Read</button>
    <button mat-button color="warn" (click)="deleteMessage(msg.id)">Delete</button>
  </mat-card-actions>
</mat-card>
