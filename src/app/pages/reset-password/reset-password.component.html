<mat-card>
    <div class="logo-section">
    <img src="assets\aynoraaa.jpeg" alt="Company Logo" class="logo" />
  </div>
  <h2>Reset Password</h2>
  <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Reset Code</mat-label>
      <input matInput formControlName="code" placeholder="Enter code from email">
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>New Password</mat-label>
      <input matInput type="password" formControlName="newPassword">
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Confirm Password</mat-label>
      <input matInput type="password" formControlName="confirmPassword">
    </mat-form-field>

    <button mat-raised-button color="primary" type="submit" [disabled]="resetForm.invalid">
      Reset Password
    </button>
  </form>
</mat-card>
